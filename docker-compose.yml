services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: employee_management

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./employee_management_system

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: employee_management
      DB_PORT: 5432
      JWT_SECRET: mysecret

  frontend:
    build: ./employee-management-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

volumes:
  postgres_data: